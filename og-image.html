<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Raleway:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #f3ecdc;
    font-family: 'Raleway', sans-serif;
    color: #171228;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.5; mix-blend-mode: multiply; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.09 0 0 0 0 0.07 0 0 0 0 0.16 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .grid { display: grid; grid-template-columns: 1.3fr 1fr; height: 100%; position: relative; z-index: 2; }
  .left { padding: 64px 60px; display: flex; flex-direction: column; justify-content: space-between; }
  .brand-row { display: flex; align-items: center; gap: 18px; }
  .brand-row img { width: 56px; height: 56px; }
  .brand-name { font-family: 'DM Serif Display', serif; font-size: 36px; line-height: 1; letter-spacing: -0.02em; }
  .brand-sub { font-size: 12px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: #a8895a; margin-top: 6px; }
  .meta-top {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.3em; color: #6b6478; margin-bottom: 36px;
  }
  .meta-top::after { content: ''; height: 1px; background: #6b6478; flex: 1; }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: 96px; line-height: 0.95; letter-spacing: -0.03em;
    color: #171228; font-weight: 400;
  }
  h1 em { font-style: italic; color: #a8895a; }
  .foot { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; padding-top: 24px; border-top: 1px solid rgba(23, 18, 40, 0.15); }
  .foot-left { font-size: 14px; line-height: 1.5; color: #2a2240; }
  .foot-left strong { display: block; font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; color: #171228; margin-bottom: 4px; }
  .foot-right { text-align: right; }
  .est-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #a8895a; margin-bottom: 4px; }
  .est-val { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 28px; line-height: 1; }
  .right {
    background: url('https://cdn.prod.website-files.com/63be7bd04823666354300253/6447dc21591a3a21ed9b7805_Familienunternehmen_Schu%CC%88er_Immobilien.jpg') center/cover;
    position: relative;
  }
  .right::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(243, 236, 220, 0.4), transparent 30%); }
  .img-cap {
    position: absolute; bottom: 28px; left: 28px; right: 28px;
    color: #f3ecdc; z-index: 2;
    background: linear-gradient(180deg, transparent, rgba(23, 18, 40, 0.7));
    padding: 16px 0;
  }
  .img-cap-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #ccb787; margin-bottom: 4px; }
  .img-cap-title { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; }
</style>
</head>
<body>
<div class="grid">
  <div class="left">
    <div>
      <div class="brand-row">
        <img src="https://cdn.prod.website-files.com/63be7bd04823666354300253/640b40a844ffd080d882c3c4_Logo_Haus_%23ccb787.png" alt="">
        <div>
          <div class="brand-name">Schüer</div>
          <div class="brand-sub">Immobilien</div>
        </div>
      </div>
    </div>
    <div>
      <div class="meta-top">Familienunternehmen — Anno MCMXC</div>
      <h1>Zuhause<br>ist unsere<br><em>Leidenschaft.</em></h1>
    </div>
    <div class="foot">
      <div class="foot-left">
        <strong>Planung · Vermietung · Verwaltung</strong>
        Im Kreis Coesfeld und in Münster — in zweiter Generation.
      </div>
      <div class="foot-right">
        <div class="est-label">— Established</div>
        <div class="est-val">1990</div>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="img-cap">
      <div class="img-cap-label">Familie Schüer</div>
      <div class="img-cap-title">Drei Generationen.</div>
    </div>
  </div>
</div>
</body>
</html>
